name: probe · rootless idmap

# DIAGNOSTIC-ONLY throwaway workflow (workflow_dispatch). v4: confirm that the
# run-time `--platform linux/<native>` flag is what trips podman 4.9.3's
# keep-id + --user 0 idmap rejection (build-and-run adds it for the native arch
# even with no #platform directive). Reproduce WITH it, show the fix WITHOUT it.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Configure Podman registries (rootless)
      run: |
        mkdir -p "$HOME/.config/containers"
        printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
    - name: Probe
      run: |
        set +e
        REPO="$PWD"
        printf 'FROM alpine:latest\n' > /tmp/Dockerfile.base
        podman build -t probe-base -f /tmp/Dockerfile.base /tmp >/dev/null 2>&1
        mkdir -p /tmp/bakectx; cp run-dockerfile-user-command /tmp/bakectx/
        printf 'FROM probe-base\nCOPY --chmod=0755 run-dockerfile-user-command /bin/run-dockerfile-user-command\n' > /tmp/bakectx/Dockerfile
        podman build -t probe.uc /tmp/bakectx >/dev/null 2>&1
        ARCH=$(podman info --format '{{.Host.Arch}}')
        echo "host arch=$ARCH"
        run() { local label="$1"; shift; echo; echo "===== $label ====="; echo "+ podman $*"; podman "$@" 2>&1 | tail -3; echo "rc=${PIPESTATUS[0]}"; }

        # 1. REPRODUCE: exactly build-and-run's shape, WITH --platform
        run "1 keepid user0 WITH --platform linux/$ARCH (expect FAIL)" \
          run --rm -i --userns=keep-id --user 0 -v "$REPO:$REPO" -w "$REPO/tests" \
          --entrypoint /bin/sh --platform "linux/$ARCH" probe.uc \
          /bin/run-dockerfile-user-command "$(id -un)" "$(id -u)" "$(id -g)" "$(id -gn)" "$HOME" id -un

        # 2. THE FIX: identical but WITHOUT --platform (expect PASS)
        run "2 keepid user0 NO --platform (expect PASS)" \
          run --rm -i --userns=keep-id --user 0 -v "$REPO:$REPO" -w "$REPO/tests" \
          --entrypoint /bin/sh probe.uc \
          /bin/run-dockerfile-user-command "$(id -un)" "$(id -u)" "$(id -g)" "$(id -gn)" "$HOME" id -un

        # 3. Cross-check: WITH --platform but run as host uid instead of --user 0
        run "3 keepid user=hostuid WITH --platform" \
          run --rm -i --userns=keep-id --user "$(id -u):$(id -g)" -v "$REPO:$REPO" -w "$REPO/tests" \
          --entrypoint /bin/sh --platform "linux/$ARCH" probe.uc \
          /bin/run-dockerfile-user-command "$(id -un)" "$(id -u)" "$(id -g)" "$(id -gn)" "$HOME" id -un

        echo; echo "===== done ====="
