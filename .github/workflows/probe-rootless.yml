name: probe · rootless idmap

# DIAGNOSTIC-ONLY throwaway workflow (workflow_dispatch). v7: the bake+run are now
# proven identical between my replication (passes) and the real run (fails); the
# ONLY remaining difference is the BASE image build. Build the base two ways -
# (A) exactly as build-and-run does (context = the test dir with its `run` symlink
# + --label), (B) from a clean /tmp context - bake+run each identically and see
# which reproduces the idmap rejection.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Configure Podman registries (rootless)
      run: |
        printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee /etc/containers/registries.conf.d/99-docker-io.conf
        mkdir -p "$HOME/.config/containers"
        printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
    - name: Probe
      run: |
        set +e
        export DOCKER_BUILDKIT=1
        REPO="$PWD"; ARCH=$(podman info --format '{{.Host.Arch}}')

        bake_and_run() { # base_tag, label
          local base="$1"
          local ucctx; ucctx=$(mktemp -d)
          cp run-dockerfile-user-command "$ucctx/"
          { printf 'FROM %s\n' "$base"; printf 'COPY --chmod=0755 run-dockerfile-user-command /bin/run-dockerfile-user-command\n'; } > "$ucctx/Dockerfile"
          podman build -t "$base.uc" --platform=linux/$ARCH --label run-dockerfile.user-command-hash=h "$ucctx" >/dev/null 2>&1
          echo "+ run $base.uc"
          podman run --rm -i --userns=keep-id --user 0 -v "$REPO:$REPO" -w "$REPO/tests/0036_unset_user_env" \
            --entrypoint /bin/sh --platform linux/$ARCH "$base.uc" \
            /bin/run-dockerfile-user-command "$(id -un)" "$(id -u)" "$(id -g)" "$(id -gn)" "$HOME" id -un 2>&1 | tail -3
          echo "rc=${PIPESTATUS[0]}"
          rm -rf "$ucctx"
        }

        echo "===== A: base built EXACTLY as build-and-run (testdir context + --label) ====="
        podman build -t b_testdir --label run-dockerfile.context-hash=e2cafe53761a07969558a2565a16cb27db8545e0799ce5b75d0e1212256bf2ef tests/0036_unset_user_env >/dev/null 2>&1
        echo "base-build-rc=$?"
        bake_and_run b_testdir

        echo
        echo "===== B: base built from clean /tmp context, no label ====="
        printf 'FROM alpine:latest\n' > /tmp/Dockerfile.base
        podman build -t b_tmp -f /tmp/Dockerfile.base /tmp >/dev/null 2>&1
        echo "base-build-rc=$?"
        bake_and_run b_tmp

        echo
        echo "===== C: base from testdir but NO label ====="
        podman build -t b_testdir_nolabel tests/0036_unset_user_env >/dev/null 2>&1
        bake_and_run b_testdir_nolabel

        echo; echo "===== done ====="
