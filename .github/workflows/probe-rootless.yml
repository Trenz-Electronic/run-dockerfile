name: probe · rootless idmap

# DIAGNOSTIC-ONLY throwaway workflow (workflow_dispatch). v3: determine whether the
# 4 rootless failures (0019/0021/0029/0036) are STATEFUL (only fail after earlier
# tests accumulate podman storage state) or INTRINSIC (fail in isolation on fresh
# storage). Runs them isolated first, then again after building up state.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      RUN_DOCKERFILE_ENGINE: podman
      RUN_DOCKERFILE_USERNS: keep-id
      RUN_DOCKERFILE_CELL_CAPS: 'cgroups gnu-stat python3 linux rootless-podman'
    steps:
    - uses: actions/checkout@v6

    - name: Configure Podman registries (rootless)
      run: |
        printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee /etc/containers/registries.conf.d/99-docker-io.conf
        mkdir -p "$HOME/.config/containers"
        printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"

    - name: ISOLATED - run only the 4 failing tests on fresh storage
      run: |
        set +e
        echo "##### Running 0019 0021 0029 0036 in ISOLATION (fresh storage) #####"
        tests/run 0019 0021 0029 0036
        echo "isolated-rc=$?"

    - name: Storage state after isolation
      run: |
        podman images | head -30
        echo "--- containers ---"; podman ps -a | head

    - name: AFTER-STATE - build up state then retry the alpine one (0036)
      run: |
        set +e
        echo "##### Running a chunk of earlier tests to accumulate state #####"
        tests/run 0005 0006 0007 0015 0016 0017 0018 0020 0026 0035
        echo "chunk-rc=$?"
        echo "##### Now retry 0036 (alpine) AFTER accumulated state #####"
        tests/run 0036
        echo "retry0036-rc=$?"
