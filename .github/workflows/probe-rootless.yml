name: probe · rootless idmap

# DIAGNOSTIC-ONLY throwaway workflow (workflow_dispatch). v6: wrap `podman` to log
# every real invocation while running the ACTUAL failing `tests/run 0036`, so we
# capture build-and-run's exact build/bake/run commands verbatim and find what my
# hand-replication missed.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      RUN_DOCKERFILE_ENGINE: podman
      RUN_DOCKERFILE_USERNS: keep-id
      RUN_DOCKERFILE_CELL_CAPS: 'cgroups gnu-stat python3 linux rootless-podman'
    steps:
    - uses: actions/checkout@v6
    - name: Configure Podman registries (rootless)
      run: |
        printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee /etc/containers/registries.conf.d/99-docker-io.conf
        mkdir -p "$HOME/.config/containers"
        printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
    - name: Wrap podman and run tests/run 0036
      run: |
        set +e
        REAL=$(command -v podman)
        echo "real podman=$REAL"
        WRAP="$HOME/wrapbin"; mkdir -p "$WRAP"
        cat > "$WRAP/podman" <<EOF
        #!/usr/bin/env bash
        { printf 'PODMAN'; for a in "\$@"; do printf ' %q' "\$a"; done; printf '\n'; } >> /tmp/podman-calls.log
        exec "$REAL" "\$@"
        EOF
        chmod +x "$WRAP/podman"
        : > /tmp/podman-calls.log
        echo "##### Running tests/run 0036 with wrapped podman #####"
        PATH="$WRAP:$PATH" tests/run 0036
        echo "tests-rc=$?"
        echo
        echo "########## CAPTURED PODMAN CALLS ##########"
        cat /tmp/podman-calls.log
