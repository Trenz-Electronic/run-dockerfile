name: probe · rootless idmap

# DIAGNOSTIC-ONLY throwaway workflow (workflow_dispatch). v9: validate the fix
# (build-and-run now normalizes $USER for rootless keep-id) against all 4 failing
# tests. If 0019/0021/0029 still fail, capture their real errors to diagnose.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      RUN_DOCKERFILE_ENGINE: podman
      RUN_DOCKERFILE_USERNS: keep-id
      RUN_DOCKERFILE_CELL_CAPS: 'cgroups gnu-stat python3 linux rootless-podman'
    steps:
    - uses: actions/checkout@v6
    - name: Configure Podman registries (rootless)
      run: |
        printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee /etc/containers/registries.conf.d/99-docker-io.conf
        mkdir -p "$HOME/.config/containers"
        printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
    - name: Run the 4 previously-failing tests with the fix
      run: |
        set +e
        tests/run 0019 0021 0029 0036
        echo "rc=$?"
