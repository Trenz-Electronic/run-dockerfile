name: macOS · Podman (rootless)

# Self-hosted macOS runner; Podman runs in a VM ("podman machine"). The default
# connection is rootless (Security.Rootless=true). The VM's virtiofs handles
# host<->VM file ownership, so no keep-id is needed here. Caps stay conservative;
# expand once a run shows them green.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  # A newer push supersedes an older queued/in-progress run of this same
  # cell, so rapid pushes do not pile up on the single self-hosted runner.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cell:
    uses: ./.github/workflows/cell.yml
    with:
      runner-json: '["self-hosted","macOS","ARM64"]'
      engine: podman
      cell-caps: 'qemu-arm64'
      setup-podman-machine: true
