name: probe · macOS podman mounts

# DIAGNOSTIC-ONLY (workflow_dispatch). Reproduce the two remaining macOS Podman
# failures with full error output (the tests hide them behind dash set -e +
# command substitution): 0017 Test 5 (rebuild after adding a context file) and
# 0006 (host reads a $HOME marker the container wrote).
on:
  workflow_dispatch:
    inputs:
      engine:
        description: 'engine string (podman | podman --connection podman-machine-default-root)'
        default: 'podman'

jobs:
  probe:
    runs-on: ["self-hosted","macOS","ARM64"]
    steps:
    - uses: actions/checkout@v6
    - name: Ensure machine
      run: |
        podman machine start 2>/dev/null || true
        podman info >/dev/null
    - name: Reproduce 0017 Test 5 and 0006
      env:
        RUN_DOCKERFILE_ENGINE: ${{ inputs.engine }}
        RUN_DOCKERFILE_VERBOSE: '1'
      run: |
        set +e
        REPO="$PWD"

        echo "########## 0017 Test 5: rebuild after adding a context file ##########"
        P=/tmp/probe-0017; rm -rf "$P"; mkdir -p "$P"; cd "$P"
        printf 'FROM alpine:latest\n' > Dockerfile
        ln -sf "$REPO/build-and-run" run
        echo "--- first build ---"; ./run echo hello; echo "first-rc=$?"
        echo "--- add context file + run (this is Test 5) ---"
        echo "test content" > test_file.txt
        ./run echo "after context change"
        echo "test5-rc=$?"
        cd "$REPO"

        echo
        echo "########## 0006: container writes \$HOME marker, host reads it ##########"
        Q=/tmp/probe-0006; rm -rf "$Q"; mkdir -p "$Q"; cd "$Q"
        printf '#mount: home\nFROM alpine:latest\n' > Dockerfile
        ln -sf "$REPO/build-and-run" run
        marker="$HOME/.run-dockerfile-probe-0006-$$"
        rm -f "$marker"
        ./run sh -c "echo MARKER_CONTENT > '$marker'; ls -ln '$marker'; id"
        echo "write-rc=$?"
        echo "--- host stat + read ---"
        ls -ln "$marker" 2>&1
        cat "$marker" 2>&1
        echo "read-rc=$?"
        rm -f "$marker" 2>/dev/null || true
