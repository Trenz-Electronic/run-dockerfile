name: Linux · Podman (rootless)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  # A newer push supersedes an older queued/in-progress run of this same
  # cell, so rapid pushes do not pile up on the single self-hosted runner.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cell:
    uses: ./.github/workflows/cell.yml
    with:
      runner-json: '"ubuntu-latest"'
      engine: podman
      userns: keep-id
      # No cross-arch here: emulated (non-native) images + --userns=keep-id + the
      # entry script's --user 0 hit "container uses ID mappings but doesn't map
      # UID 0", and a multi-arch store makes `FROM alpine` resolve to a foreign
      # arch. Cross-arch is engine-agnostic and is covered by the Docker and
      # rootful-Podman cells, so this cell omits the qemu-* caps and QEMU setup.
      cell-caps: 'cgroups gnu-stat python3 linux rootless-podman home-bind'
      setup-podman: true
