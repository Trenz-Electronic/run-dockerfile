name: Linux · Podman (rootful)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  # A newer push supersedes an older queued/in-progress run of this same
  # cell, so rapid pushes do not pile up on the single self-hosted runner.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cell:
    uses: ./.github/workflows/cell.yml
    with:
      runner-json: '"ubuntu-latest"'
      engine: 'sudo podman'
      cell-caps: 'qemu-amd64 qemu-arm64 qemu-armv7 cgroups gnu-stat python3 linux home-bind'
      setup-qemu: true
      setup-podman: true
