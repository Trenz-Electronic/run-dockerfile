name: Linux · Podman (rootful)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cell:
    uses: ./.github/workflows/cell.yml
    with:
      runner-json: '"ubuntu-latest"'
      engine: 'sudo podman'
      cell-caps: 'qemu-amd64 qemu-arm64 qemu-armv7 cgroups gnu-stat python3 linux'
      setup-qemu: true
      setup-podman: true
