name: macOS · Podman (rootful)

# Same podman-machine VM as the rootless cell, but targeting its rootful
# connection (podman-machine-default-root) rather than the default rootless one,
# passed verbatim as the engine. One VM serves both connections.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  # A newer push supersedes an older queued/in-progress run of this same
  # cell, so rapid pushes do not pile up on the single self-hosted runner.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cell:
    uses: ./.github/workflows/cell.yml
    with:
      runner-json: '["self-hosted","macOS","ARM64"]'
      engine: 'podman --connection podman-machine-default-root'
      cell-caps: 'qemu-arm64'
      setup-podman-machine: true
